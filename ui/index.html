<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚀 Prometheus Monitor Dashboard</title>
  <script
    src="/__monitor/vendor/chart.js"
    onerror="(function(){var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.min.js';document.head.appendChild(s);}())"
  ></script>
  
  <style>
    :root {
      --bg: #0b1220;
      --bg-secondary: #141d2f;
      --card: rgba(255,255,255,0.05);
      --card-hover: rgba(255,255,255,0.08);
      --text: #ffffff;
      --text-muted: #b0b8c8;
      --accent: #00ffc3;
      --accent-alt: #4da6ff;
      --error: #ff4d4d;
      --success: #4dff4d;
      --chart-bg: rgba(20, 29, 47, 0.8);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body.light {
      --bg: #f5f7fb;
      --bg-secondary: #e9ecf0;
      --card: #ffffff;
      --card-hover: #f0f2f5;
      --text: #0a0e27;
      --text-muted: #6b7280;
      --chart-bg: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      transition: var(--transition);
      line-height: 1.6;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-alt) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--card);
      border-radius: 8px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .toggle-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: var(--transition);
    }

    .toggle-btn:hover {
      background: var(--card-hover);
      border-color: rgba(255, 255, 255, 0.4);
      transform: translateY(-2px);
    }

    /* Grid Layout */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .metric-card {
      background: var(--card);
      padding: 24px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .metric-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .metric-card:hover {
      background: var(--card-hover);
      transform: translateY(-4px);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .metric-card:hover::before {
      opacity: 1;
    }

    .metric-label {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .metric-value {
      font-size: 36px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
      font-variant-numeric: tabular-nums;
      transition: var(--transition);
    }

    .metric-change {
      font-size: 12px;
      color: var(--text-muted);
    }

    .metric-change.positive {
      color: var(--success);
    }

    .metric-change.negative {
      color: var(--error);
    }

    /* Charts Section */
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
      gap: 24px;
      margin-bottom: 32px;
    }

    .chart-container {
      background: var(--card);
      padding: 24px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
    }

    .chart-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text);
    }

    canvas {
      max-height: 300px;
    }

    /* Routes Table */
    .routes-section {
      background: var(--card);
      padding: 24px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      margin-bottom: 32px;
    }

    .routes-section h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .route-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .route-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: var(--bg-secondary);
      border-radius: 8px;
      border-left: 3px solid var(--accent);
      transition: var(--transition);
    }

    .route-item:hover {
      transform: translateX(4px);
      background: var(--card-hover);
    }

    .route-name {
      font-weight: 500;
      color: var(--text);
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 13px;
    }

    .route-count {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
    }

    /* Error States */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        padding: 16px;
      }

      .header {
        flex-direction: column;
        gap: 16px;
        align-items: flex-start;
      }

      .charts-grid {
        grid-template-columns: 1fr;
      }

      .metric-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Loading animation */
    .loading {
      opacity: 0.6;
      pointer-events: none;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .metric-card {
      animation: fadeIn 0.5s ease-out;
    }
  </style>
</head>

<body>

  <div class="container">
    
    <!-- Header -->
    <div class="header">
      <h1>🚀 Prometheus Monitor</h1>
      <div class="header-controls">
        <div class="status-indicator">
          <div class="status-dot"></div>
          <span id="statusText">Connecting...</span>
        </div>
        <button class="toggle-btn" onclick="toggleTheme()">🌗 Theme</button>
      </div>
    </div>

    <!-- Key Metrics -->
    <div class="metrics-grid">
      <div class="metric-card">
        <div class="metric-label">Total Requests</div>
        <div class="metric-value" id="totalRequests">0</div>
        <div class="metric-change" id="requestsChange">↗ Now</div>
      </div>

      <div class="metric-card">
        <div class="metric-label">Avg Latency</div>
        <div class="metric-value" id="avgLatency">0 <span style="font-size: 24px;">ms</span></div>
        <div class="metric-change" id="latencyChange">Last update</div>
      </div>

      <div class="metric-card">
        <div class="metric-label">Error Rate</div>
        <div class="metric-value" id="errorRate">0 <span style="font-size: 24px;">%</span></div>
        <div class="metric-change" id="errorChange">Errors detected</div>
      </div>

      <div class="metric-card">
        <div class="metric-label">Active Routes</div>
        <div class="metric-value" id="activeRoutes">0</div>
        <div class="metric-change" id="routeChange">Monitored Endpoints</div>
      </div>
    </div>

    <!-- Charts Section -->
    <div class="charts-grid">
      <div class="chart-container">
        <div class="chart-title">📈 RPS (Requests Per Second)</div>
        <canvas id="rpsChart"></canvas>
      </div>

      <div class="chart-container">
        <div class="chart-title">⚡ Latency Trend (ms)</div>
        <canvas id="latencyChart"></canvas>
      </div>

      <div class="chart-container">
        <div class="chart-title">🚨 Error Rate</div>
        <canvas id="errorChart"></canvas>
      </div>

      <div class="chart-container">
        <div class="chart-title">🚦 Per-Route Traffic</div>
        <canvas id="routeChart"></canvas>
      </div>
    </div>

    <!-- Top Routes -->
    <div class="routes-section">
      <h2>🔥 Top Routes (Last 30s)</h2>
      <div class="route-list" id="routesList">
        <div class="empty-state">
          <div class="empty-state-icon">⏳</div>
          <p>Waiting for traffic data...</p>
        </div>
      </div>
    </div>

  </div>

  <script>
    // ============ CONFIG ============
    const CHART_CONFIG = {
      responsive: true,
      maintainAspectRatio: false,
      animation: {
        duration: 400
      },
      plugins: {
        legend: {
          labels: {
            color: getComputedStyle(document.documentElement).getPropertyValue('--text'),
            font: { size: 12, weight: '500' }
          }
        }
      },
      scales: {
        x: {
          ticks: { color: getComputedStyle(document.documentElement).getPropertyValue('--text-muted') },
          grid: { color: 'rgba(255, 255, 255, 0.05)' }
        },
        y: {
          ticks: { color: getComputedStyle(document.documentElement).getPropertyValue('--text-muted') },
          grid: { color: 'rgba(255, 255, 255, 0.05)' }
        }
      }
    };

    // ============ STATE ============
    let metrics = null;
    let lastRequests = 0;
    let lastErrors = 0;
    let lastLatency = 0;
    let history = {
      rps: [],
      latency: [],
      errors: [],
      timestamps: []
    };

    const MAX_HISTORY = 30; // Keep last 30 data points

    // ============ CHARTS ============
    const charts = {};
    let lastMessageAt = 0;

    function initCharts() {
      if (typeof Chart !== 'function') {
        console.warn('Chart.js not loaded. Dashboard will still show numeric metrics.');
        return;
      }

      const chartConfig = { ...CHART_CONFIG, maintainAspectRatio: true };

      // RPS Chart
      charts.rps = new Chart(document.getElementById('rpsChart'), {
        type: 'line',
        data: {
          labels: [],
          datasets: [{
            label: 'RPS',
            data: [],
            borderColor: '#00ffc3',
            backgroundColor: 'rgba(0, 255, 195, 0.1)',
            borderWidth: 2,
            fill: true,
            tension: 0.4,
            pointRadius: 4,
            pointBackgroundColor: '#00ffc3',
            pointBorderColor: '#0b1220',
            pointBorderWidth: 2
          }]
        },
        options: chartConfig
      });

      // Latency Chart
      charts.latency = new Chart(document.getElementById('latencyChart'), {
        type: 'line',
        data: {
          labels: [],
          datasets: [{
            label: 'Latency (ms)',
            data: [],
            borderColor: '#4da6ff',
            backgroundColor: 'rgba(77, 166, 255, 0.1)',
            borderWidth: 2,
            fill: true,
            tension: 0.4,
            pointRadius: 4,
            pointBackgroundColor: '#4da6ff',
            pointBorderColor: '#0b1220',
            pointBorderWidth: 2
          }]
        },
        options: chartConfig
      });

      // Error Rate Chart
      charts.errors = new Chart(document.getElementById('errorChart'), {
        type: 'line',
        data: {
          labels: [],
          datasets: [{
            label: 'Errors',
            data: [],
            borderColor: '#ff4d4d',
            backgroundColor: 'rgba(255, 77, 77, 0.1)',
            borderWidth: 2,
            fill: true,
            tension: 0.4,
            pointRadius: 4,
            pointBackgroundColor: '#ff4d4d',
            pointBorderColor: '#0b1220',
            pointBorderWidth: 2
          }]
        },
        options: chartConfig
      });

      // Route Chart (Bar)
      charts.routes = new Chart(document.getElementById('routeChart'), {
        type: 'bar',
        data: {
          labels: [],
          datasets: [{
            label: 'Requests',
            data: [],
            backgroundColor: [
              'rgba(0, 255, 195, 0.6)',
              'rgba(77, 166, 255, 0.6)',
              'rgba(255, 170, 0, 0.6)',
              'rgba(255, 77, 77, 0.6)',
              'rgba(150, 100, 255, 0.6)'
            ],
            borderRadius: 6
          }]
        },
        options: { ...chartConfig, indexAxis: undefined }
      });
    }

    function updateChart(chart, label, value) {
      if (!chart) {
        return;
      }

      chart.data.labels.push(label);
      chart.data.datasets[0].data.push(value);

      if (chart.data.labels.length > MAX_HISTORY) {
        chart.data.labels.shift();
        chart.data.datasets[0].data.shift();
      }

      chart.update('none');
    }

    // ============ DATA PROCESSING ============
    function processMetrics(data) {
      if (!data || !Array.isArray(data)) return null;

      try {
        let totalRequests = 0;
        let totalErrors = 0;
        let histogramSum = 0;
        let histogramCount = 0;
        const routeMap = {};

        data.forEach(m => {
          // Counter: total requests
          if (m.name === 'http_requests_total' && m.values) {
            m.values.forEach(v => {
              totalRequests += v.value || 0;
              const route = v.labels?.route || 'unknown';
              routeMap[route] = (routeMap[route] || 0) + v.value;
            });
          }

          // Counter: error count (4xx + 5xx)
          if (m.name === 'http_errors_total' && m.values) {
            m.values.forEach(v => {
              totalErrors += v.value || 0;
            });
          }

          // Histogram: latency distribution
          // Histograms expose _sum and _count suffixes
          if (m.name === 'http_request_duration_seconds_sum' && m.values) {
            m.values.forEach(v => {
              histogramSum += v.value || 0;
            });
          }

          if (m.name === 'http_request_duration_seconds_count' && m.values) {
            m.values.forEach(v => {
              histogramCount += v.value || 0;
            });
          }
        });

        // Calculate average latency from histogram
        const avgLatency = histogramCount > 0 ? (histogramSum / histogramCount) * 1000 : 0;
        const errorRate = totalRequests > 0 ? (totalErrors / totalRequests) * 100 : 0;
        const rps = totalRequests - lastRequests;

        lastRequests = totalRequests;
        lastErrors = totalErrors;
        lastLatency = avgLatency;

        return {
          totalRequests,
          totalErrors,
          avgLatency,
          errorRate,
          rps: Math.max(0, rps),
          routes: routeMap
        };
      } catch (e) {
        console.error('Metric processing error:', e);
        return null;
      }
    }

    // ============ UI UPDATES ============
    function updateUI(processedMetrics) {
      if (!processedMetrics) return;

      const now = new Date().toLocaleTimeString('en-US', { 
        hour12: false, 
        hour: '2-digit', 
        minute: '2-digit', 
        second: '2-digit' 
      });

      // Update metric cards with animation
      animateValue('totalRequests', processedMetrics.totalRequests);
      animateValue('avgLatency', processedMetrics.avgLatency.toFixed(2));
      animateValue('errorRate', processedMetrics.errorRate.toFixed(1));
      animateValue('activeRoutes', Object.keys(processedMetrics.routes).length);

      // Update change indicators
      document.getElementById('requestsChange').textContent = `↗ ${processedMetrics.rps} RPS`;
      document.getElementById('latencyChange').textContent = `${processedMetrics.avgLatency > lastLatency ? '↗' : '↘'} ${processedMetrics.avgLatency.toFixed(1)}ms`;
      document.getElementById('errorChange').textContent = `${processedMetrics.totalErrors} errors`;

      // Update charts
      updateChart(charts.rps, now, processedMetrics.rps);
      updateChart(charts.latency, now, processedMetrics.avgLatency);
      updateChart(charts.errors, now, processedMetrics.totalErrors);

      // Update route chart
      const topRoutes = Object.entries(processedMetrics.routes)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 5);

      if (charts.routes) {
        charts.routes.data.labels = topRoutes.map(r => r[0]);
        charts.routes.data.datasets[0].data = topRoutes.map(r => r[1]);
        charts.routes.update('none');
      }

      // Update routes list
      updateRoutesList(processedMetrics.routes);
    }

    function updateRoutesList(routes) {
      const sorted = Object.entries(routes)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 10);

      const ul = document.getElementById('routesList');
      if (sorted.length === 0) {
        ul.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⏳</div><p>Waiting for traffic data...</p></div>';
        return;
      }

      ul.innerHTML = sorted.map(([route, count]) => `
        <div class="route-item">
          <span class="route-name">${escapeHtml(route)}</span>
          <span class="route-count">${count}</span>
        </div>
      `).join('');
    }

    function animateValue(id, newVal) {
      const el = document.getElementById(id);
      if (!el) return;

      const oldVal = el.innerText;
      if (oldVal === newVal) return;

      el.style.opacity = '0.7';
      setTimeout(() => {
        el.innerText = newVal;
        el.style.opacity = '1';
      }, 150);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.innerText = text;
      return div.innerHTML;
    }

    // ============ WEBSOCKET CONNECTION ============
    function connectWebSocket() {
      const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
      const ws = new WebSocket(`${protocol}://${window.location.host}/__monitor/ws`);

      ws.onopen = () => {
        console.log('✅ Connected to metrics stream');
        updateStatus(true, 'Connected');
      };

      ws.onmessage = (event) => {
        try {
          const metricsData = JSON.parse(event.data);
          lastMessageAt = Date.now();
          const processed = processMetrics(metricsData);
          if (processed) updateUI(processed);
        } catch (e) {
          console.error('Message parse error:', e);
        }
      };

      ws.onerror = (err) => {
        console.error('❌ WebSocket error:', err);
        updateStatus(false, 'WebSocket error');
      };

      ws.onclose = () => {
        console.log('⚠️ Disconnected, reconnecting in 3s...');
        updateStatus(false, 'Reconnecting...');
        setTimeout(connectWebSocket, 3000);
      };

      return ws;
    }

    async function pollMetricsOnce() {
      try {
        const res = await fetch('/__monitor/data', { cache: 'no-store' });
        const metricsData = await res.json();
        const processed = processMetrics(metricsData);
        if (processed) {
          updateUI(processed);
          updateStatus(true, 'Live (polling)');
        }
      } catch (error) {
        console.error('Polling error:', error);
      }
    }

    function startFallbackPolling() {
      setInterval(async () => {
        // Use HTTP polling when websocket is stale
        if (Date.now() - lastMessageAt > 5000) {
          await pollMetricsOnce();
        }
      }, 3000);
    }

    function updateStatus(connected, text) {
      const statusEl = document.getElementById('statusText');
      if (connected) {
        statusEl.textContent = text || 'Connected';
        statusEl.style.color = 'var(--text)';
      } else {
        statusEl.textContent = text || 'Reconnecting...';
        statusEl.style.color = 'var(--error)';
      }
    }

    // ============ THEME TOGGLE ============
    function toggleTheme() {
      document.body.classList.toggle('light');
      localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
    }

    function initTheme() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'light') {
        document.body.classList.add('light');
      }
    }

    // ============ INIT ============
    function init() {
      initTheme();
      initCharts();
      pollMetricsOnce();
      connectWebSocket();
      startFallbackPolling();
    }

    init();
  </script>

</body>
</html>
